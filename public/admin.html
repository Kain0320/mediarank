<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin – Media Ranker</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    .search-result-card {
      cursor: pointer;
      transition: background .15s;
    }
    .search-result-card:hover { background: #f0f4ff; }
    .search-result-img {
      width: 48px; height: 64px;
      object-fit: cover;
      border-radius: 4px;
      background: #eee;
      flex-shrink: 0;
    }
    .search-result-img-placeholder {
      width: 48px; height: 64px;
      border-radius: 4px;
      background: #e9ecef;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem; flex-shrink: 0;
    }
  </style>
</head>
<body class="bg-light">

  <!-- ── Login overlay ─────────────────────────────────────── -->
  <div id="loginOverlay" class="d-flex align-items-center justify-content-center vh-100">
    <div class="card shadow" style="width:360px;">
      <div class="card-body p-4">
        <h2 class="card-title mb-4 text-center">🔐 Admin přihlášení</h2>
        <div id="loginError" class="alert alert-danger d-none">Nesprávné přihlašovací údaje</div>
        <div class="mb-3">
          <label class="form-label">Uživatelské jméno</label>
          <input type="text" class="form-control" id="loginUsername" />
        </div>
        <div class="mb-3">
          <label class="form-label">Heslo</label>
          <input type="password" class="form-control" id="loginPassword" />
        </div>
        <button class="btn btn-dark w-100" id="loginBtn">Přihlásit se</button>
      </div>
    </div>
  </div>

  <!-- ── Admin panel ───────────────────────────────────────── -->
  <div id="adminPanel" style="display:none;">

    <nav class="navbar navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand fw-bold" href="/">🎬 Media Ranker</a>
        <span class="text-light me-3">Admin panel</span>
        <div>
          <a href="/" class="btn btn-outline-light btn-sm me-2">← Web</a>
          <button class="btn btn-outline-danger btn-sm" id="logoutBtn">Odhlásit</button>
        </div>
      </div>
    </nav>

    <main class="container my-4">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3">Správa media položek</h1>
        <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#addModal">
          <i class="bi bi-plus-lg"></i> Přidat položku
        </button>
      </div>

      <div class="card shadow-sm">
        <div class="card-body p-0">
          <table class="table table-hover mb-0" id="adminTable">
            <thead class="table-dark">
              <tr>
                <th>Název</th><th>Typ</th><th>Žánr</th>
                <th>Skóre</th><th>Tier</th><th>Akce</th>
              </tr>
            </thead>
            <tbody id="adminTableBody"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <!-- ── Modal: přidání položky ───────────────────────────── -->
  <div class="modal fade" id="addModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">

        <div class="modal-header">
          <h5 class="modal-title">Přidat media položku</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        <div class="modal-body">

          <!-- ── Tab přepínač ─────────────────────────────── -->
          <ul class="nav nav-tabs mb-3" id="addTabs">
            <li class="nav-item">
              <button class="nav-link active" data-tab="search">
                🔍 Hledat v databázi
              </button>
            </li>
            <li class="nav-item">
              <button class="nav-link" data-tab="manual">
                ✏️ Zadat ručně
              </button>
            </li>
          </ul>

          <!-- ── TAB 1: Vyhledávání IGDB / TMDB ──────────── -->
          <div id="tabSearch">
            <div class="row g-2 mb-3">
              <div class="col-5">
                <input type="text" class="form-control" id="searchQuery"
                  placeholder="Název hry, filmu nebo seriálu..." />
              </div>
              <div class="col-4">
                <select class="form-select" id="searchType">
                  <option value="Game">🎮 Hra (IGDB)</option>
                  <option value="Movie">🎬 Film (TMDB)</option>
                  <option value="Series">📺 Seriál (TMDB)</option>
                </select>
              </div>
              <div class="col-3">
                <button class="btn btn-primary w-100" id="searchBtn">
                  <i class="bi bi-search"></i> Hledat
                </button>
              </div>
            </div>

            <!-- Výsledky -->
            <div id="searchStatus" class="text-muted small mb-2 d-none"></div>
            <div id="searchResults" class="border rounded" style="max-height:340px; overflow-y:auto;"></div>
          </div>

          <!-- ── TAB 2: Ruční zadání ───────────────────────── -->
          <div id="tabManual" class="d-none">
            <div class="mb-3">
              <label class="form-label">Název *</label>
              <input type="text" class="form-control" id="addTitle" />
            </div>
            <div class="mb-3">
              <label class="form-label">Typ *</label>
              <select class="form-select" id="addType">
                <option value="">-- vyber --</option>
                <option value="Movie">🎬 Film</option>
                <option value="Series">📺 Seriál</option>
                <option value="Game">🎮 Hra</option>
              </select>
            </div>
            <div class="mb-3">
              <label class="form-label">Žánr</label>
              <input type="text" class="form-control" id="addGenre" placeholder="např. Action, RPG, Drama..." />
            </div>
            <div class="mb-3">
              <label class="form-label">URL obrázku</label>
              <input type="url" class="form-control" id="addImageUrl" placeholder="https://..." />
            </div>
            <button class="btn btn-success w-100" id="addSubmitBtn">
              <i class="bi bi-plus-lg"></i> Přidat ručně
            </button>
          </div>

        </div><!-- /modal-body -->
      </div>
    </div>
  </div>

  <!-- ── Modal: správa epizod seriálu ────────────────────── -->
  <div class="modal fade" id="episodesModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Epizody: <span id="episodesModalTitle"></span></h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <!-- Přidat epizodu -->
          <div class="card mb-3">
            <div class="card-body">
              <h6 class="card-title mb-3">Přidat hodnocení epizody</h6>
              <div class="row g-2 align-items-end">
                <div class="col-2">
                  <label class="form-label small">Sezóna *</label>
                  <input type="number" class="form-control form-control-sm" id="epSeason" min="1" value="1" />
                </div>
                <div class="col-2">
                  <label class="form-label small">Epizoda *</label>
                  <input type="number" class="form-control form-control-sm" id="epNumber" min="1" value="1" />
                </div>
                <div class="col-2">
                  <label class="form-label small">Hodnocení *</label>
                  <input type="number" class="form-control form-control-sm" id="epRating" min="1" max="10" step="0.1" placeholder="1–10" />
                </div>
                <div class="col-4">
                  <label class="form-label small">Název epizody</label>
                  <input type="text" class="form-control form-control-sm" id="epTitle" placeholder="volitelné" />
                </div>
                <div class="col-2">
                  <button class="btn btn-success btn-sm w-100" id="epAddBtn">
                    <i class="bi bi-plus-lg"></i> Přidat
                  </button>
                </div>
              </div>
              <div id="epError" class="text-danger small mt-2 d-none"></div>
            </div>
          </div>

          <!-- Seznam epizod -->
          <div id="episodesList"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/admin.js"></script>
</body>
</html>
