<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Přihlášení – Media Ranker</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="bg-dark text-white">

  <nav class="navbar navbar-dark bg-dark border-bottom border-secondary">
    <div class="container">
      <a class="navbar-brand fw-bold" href="/">🎬 Media Ranker</a>
    </div>
  </nav>

  <main class="container" style="max-width: 420px; margin-top: 80px;">
    <div class="card bg-secondary text-white shadow">
      <div class="card-body p-4">
        <h2 class="card-title mb-4 text-center">Přihlášení</h2>

        <div id="alertBox" class="alert d-none" role="alert"></div>

        <form id="loginForm">
          <div class="mb-3">
            <label for="email" class="form-label">E-mail</label>
            <input type="text" class="form-control" id="email" placeholder="vas@email.cz" required />
          </div>
          <div class="mb-4">
            <label for="password" class="form-label">Heslo</label>
            <input type="password" class="form-control" id="password"
              placeholder="Tvoje heslo" required />
          </div>

          <button type="submit" class="btn btn-primary w-100">
            Přihlásit se
          </button>
        </form>

        <!-- Rychlý přístup pro admina (jen pro vývoj) -->
        <div class="mt-3 text-center small text-muted">
          Admin: zadej <code>admin</code> jako e-mail a <code>admin123</code> jako heslo
        </div>

        <hr class="my-3" />
        <p class="text-center mb-0 small">
          Nemáš účet? <a href="/register.html" class="text-info">Zaregistruj se</a>
        </p>
      </div>
    </div>
  </main>

  <script>
    // Pokud už je přihlášen, přesměruj
    if (localStorage.getItem("token")) {
      window.location.href = "/";
    }

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const alertBox = document.getElementById("alertBox");
      const body = {
        username: document.getElementById("email").value.trim(),
        password: document.getElementById("password").value
      };

      try {
        const res  = await fetch("/api/auth/login", {
          method:  "POST",
          headers: { "Content-Type": "application/json" },
          body:    JSON.stringify(body)
        });
        const data = await res.json();

        if (!res.ok) {
          alertBox.className   = "alert alert-danger";
          alertBox.textContent = data.error || "Přihlášení selhalo";
          alertBox.classList.remove("d-none");
          return;
        }

        localStorage.setItem("token",    data.token);
        localStorage.setItem("username", data.username);
        localStorage.setItem("role",     data.role);
        window.location.href = "/";

      } catch {
        alertBox.className   = "alert alert-danger";
        alertBox.textContent = "Chyba připojení k serveru";
        alertBox.classList.remove("d-none");
      }
    });
  </script>

</body>
</html>
