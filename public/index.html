<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Media Ranker</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

  <!-- ── Navigace ──────────────────────────────────────────── -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand fw-bold" href="/">🎬 Media Ranker</a>
      <button class="navbar-toggler" type="button"
        data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto align-items-center">
          <li class="nav-item">
            <a class="nav-link active" href="/">Domů</a>
          </li>
          <li class="nav-item d-none" id="navAdmin">
            <a class="nav-link" href="/admin.html">Admin</a>
          </li>
          <li class="nav-item" id="navLogin">
            <a class="nav-link" href="/login.html">Přihlásit</a>
          </li>
          <li class="nav-item" id="navRegister">
            <a class="btn btn-outline-light btn-sm ms-2" href="/register.html">Registrace</a>
          </li>
          <li class="nav-item d-none dropdown" id="navUser">
            <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">
              👤 <span id="navUsername"></span>
            </a>
            <ul class="dropdown-menu dropdown-menu-end">
              <li><span class="dropdown-item-text text-muted small" id="navRole"></span></li>
              <li><hr class="dropdown-divider"></li>
              <li><a class="dropdown-item text-danger" href="#" id="logoutBtn">Odhlásit se</a></li>
            </ul>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- ── Statistiky / Grafy ────────────────────────────────── -->
  <section class="bg-dark text-white py-4 border-bottom border-secondary" id="statsSection">
    <div class="container">

      <!-- Countery nahoře -->
      <div class="row g-3 mb-4" id="statCounters">
        <div class="col-6 col-md-3">
          <div class="stat-card text-center p-3 rounded">
            <div class="stat-number" id="statTotal">–</div>
            <div class="stat-label">Celkem položek</div>
          </div>
        </div>
        <div class="col-6 col-md-3">
          <div class="stat-card text-center p-3 rounded">
            <div class="stat-number text-primary" id="statMovies">–</div>
            <div class="stat-label">🎬 Filmy</div>
          </div>
        </div>
        <div class="col-6 col-md-3">
          <div class="stat-card text-center p-3 rounded">
            <div class="stat-number text-success" id="statSeries">–</div>
            <div class="stat-label">📺 Seriály</div>
          </div>
        </div>
        <div class="col-6 col-md-3">
          <div class="stat-card text-center p-3 rounded">
            <div class="stat-number text-warning" id="statGames">–</div>
            <div class="stat-label">🎮 Hry</div>
          </div>
        </div>
      </div>

      <!-- Tři grafy -->
      <div class="row g-3">
        <!-- Doughnut – rozložení typů -->
        <div class="col-12 col-md-4">
          <div class="chart-box p-3 rounded">
            <h6 class="text-muted text-center mb-3">Rozložení typů</h6>
            <canvas id="chartTypes" height="220"></canvas>
          </div>
        </div>
        <!-- Bar – rozložení tierů -->
        <div class="col-12 col-md-4">
          <div class="chart-box p-3 rounded">
            <h6 class="text-muted text-center mb-3">Tier distribuce</h6>
            <canvas id="chartTiers" height="220"></canvas>
          </div>
        </div>
        <!-- Horizontal bar – Top 5 -->
        <div class="col-12 col-md-4">
          <div class="chart-box p-3 rounded">
            <h6 class="text-muted text-center mb-3">Top 5 hodnocení</h6>
            <canvas id="chartTop5" height="220"></canvas>
          </div>
        </div>
      </div>

    </div>
  </section>

  <!-- ── Hlavní obsah ──────────────────────────────────────── -->
  <main class="container my-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
      <h1 class="h3 mb-0">Všechna media</h1>
      <div class="btn-group" role="group" id="filterButtons">
        <button class="btn btn-outline-secondary btn-sm active" data-filter="all">Vše</button>
        <button class="btn btn-outline-primary btn-sm" data-filter="Movie">🎬 Filmy</button>
        <button class="btn btn-outline-success btn-sm" data-filter="Series">📺 Seriály</button>
        <button class="btn btn-outline-warning btn-sm" data-filter="Game">🎮 Hry</button>
      </div>
    </div>

    <div id="loader" class="text-center py-5">
      <div class="spinner-border text-secondary" role="status">
        <span class="visually-hidden">Načítám...</span>
      </div>
      <p class="text-muted mt-2">Načítám data z API...</p>
    </div>

    <div id="mediaGrid" class="row g-3" style="display:none;"></div>

    <div id="emptyState" class="text-center py-5" style="display:none;">
      <p class="text-muted fs-5">Žádné položky zatím nejsou. Přidej první!</p>
    </div>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Chart.js pro grafy -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
