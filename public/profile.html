<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profil – Media Ranker</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    body { background: #0d1117; color: #e2e8f0; min-height: 100vh; }

    /* ── Navbar ── */
    .site-nav { background: #070a10; border-bottom: 1px solid #1e2433; }

    /* ── Hero profil ── */
    .profile-hero {
      background: linear-gradient(135deg, #0f1117 0%, #1a1f2e 100%);
      border-bottom: 1px solid #2d3748;
      padding: 40px 0 36px;
    }
    .avatar-circle {
      width: 88px; height: 88px;
      border-radius: 50%;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      display: flex; align-items: center; justify-content: center;
      font-size: 2.4rem;
      font-weight: 800;
      color: #fff;
      border: 3px solid #2d3748;
      flex-shrink: 0;
    }
    .profile-username { font-size: 1.9rem; font-weight: 800; color: #fff; line-height: 1; }
    .profile-role { font-size: 0.82rem; color: #6b7280; margin-top: 4px; }

    /* ── Stats counters ── */
    .profile-stat {
      text-align: center;
      padding: 16px 24px;
      border-radius: 10px;
      background: rgba(255,255,255,0.04);
      border: 1px solid #2d3748;
    }
    .profile-stat-num { font-size: 1.9rem; font-weight: 800; line-height: 1; color: #fff; }
    .profile-stat-label { font-size: 0.75rem; color: #6b7280; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.06em; }

    /* ── Tabs ── */
    .profile-tabs {
      background: #0d1117;
      border-bottom: 1px solid #2d3748;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .profile-tab-btn {
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      color: #6b7280;
      padding: 14px 22px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: color .15s, border-color .15s;
      white-space: nowrap;
    }
    .profile-tab-btn:hover { color: #e2e8f0; }
    .profile-tab-btn.active { color: #3b82f6; border-bottom-color: #3b82f6; }

    /* ── Review karta ── */
    .review-item {
      background: #1a1f2e;
      border: 1px solid #2d3748;
      border-radius: 10px;
      padding: 14px 16px;
      display: flex;
      align-items: flex-start;
      gap: 14px;
      transition: background .15s;
    }
    .review-item:hover { background: #232a3b; }
    .review-item a { text-decoration: none; color: inherit; }
    .review-thumb {
      width: 52px; height: 78px;
      border-radius: 6px;
      object-fit: cover;
      flex-shrink: 0;
      background: #2d3748;
    }
    .review-thumb-placeholder {
      width: 52px; height: 78px;
      border-radius: 6px;
      background: #1e293b;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.6rem;
      flex-shrink: 0;
    }
    .review-title { font-size: 0.97rem; font-weight: 700; color: #e2e8f0; margin-bottom: 3px; }
    .review-meta { font-size: 0.78rem; color: #6b7280; margin-bottom: 6px; }
    .review-score { font-size: 0.88rem; font-weight: 700; color: #fbbf24; }
    .review-comment { font-size: 0.85rem; color: #94a3b8; line-height: 1.55; margin-top: 6px; }
    .review-date { font-size: 0.75rem; color: #4b5563; margin-left: auto; white-space: nowrap; }

    /* Tier badge barvy */
    .tier-S { color: #ef4444; }
    .tier-A { color: #f59e0b; }
    .tier-B { color: #22c55e; }
    .tier-C { color: #06b6d4; }
    .tier-D { color: #6b7280; }

    /* ── Watchlist karta ── */
    .wl-card {
      background: #1a1f2e;
      border: 1px solid #2d3748;
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      transition: transform .15s, box-shadow .15s;
      position: relative;
    }
    .wl-card:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0,0,0,.4); }
    .wl-card-img { width: 100%; height: 160px; object-fit: cover; }
    .wl-card-img-placeholder {
      width: 100%; height: 160px;
      background: #1e293b;
      display: flex; align-items: center; justify-content: center;
      font-size: 3rem;
    }
    .wl-card-body { padding: 10px 12px; }
    .wl-card-title { font-size: 0.88rem; font-weight: 700; color: #e2e8f0; line-height: 1.3; margin-bottom: 3px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
    .wl-card-meta { font-size: 0.75rem; color: #6b7280; }
    .wl-remove-btn {
      position: absolute;
      top: 8px; right: 8px;
      background: rgba(0,0,0,.7);
      border: none;
      color: #9ca3af;
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 0.78rem;
      cursor: pointer;
      opacity: 0;
      transition: opacity .15s, color .15s;
    }
    .wl-card:hover .wl-remove-btn { opacity: 1; }
    .wl-remove-btn:hover { color: #ef4444; }

    /* ── Prázdný stav ── */
    .empty-profile {
      text-align: center;
      padding: 60px 20px;
      color: #4b5563;
    }
    .empty-profile .empty-icon { font-size: 3.5rem; margin-bottom: 16px; }
    .empty-profile p { font-size: 1rem; margin-bottom: 8px; }
    .empty-profile small { font-size: 0.85rem; color: #374151; }

    /* ── Loader ── */
    .section-loader { text-align: center; padding: 48px 0; color: #4b5563; }
  </style>
  <script>
    (function() {
      var t = localStorage.getItem("theme") || "dark";
      document.documentElement.dataset.theme = t;
    })();
  </script>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar site-nav py-2">
    <div class="container d-flex align-items-center gap-2 flex-wrap">
      <a href="/" class="text-decoration-none d-flex align-items-center gap-2 me-3">
        <span style="font-size:1.35rem;">🎬</span>
        <span class="fw-bold text-white" style="font-size:1.05rem;">Media Ranker</span>
      </a>
      <a href="/" class="btn btn-sm btn-outline-secondary">
        <i class="bi bi-house me-1"></i>Domů
      </a>
      <span class="text-secondary ms-auto small" id="navbarUser"></span>
      <button class="btn btn-sm btn-outline-danger" id="logoutBtn" style="display:none;">
        <i class="bi bi-box-arrow-right me-1"></i>Odhlásit
      </button>
    </div>
  </nav>

  <!-- Auth guard -->
  <div class="container text-center py-5 d-none" id="authGuard">
    <p class="text-muted fs-5">Pro zobrazení profilu se musíš přihlásit.</p>
    <a href="/login.html" class="btn btn-primary mt-2">Přihlásit se</a>
  </div>

  <!-- Obsah profilu -->
  <div id="profileContent" style="display:none;">

    <!-- Profilový hero -->
    <div class="profile-hero">
      <div class="container">
        <div class="d-flex align-items-center gap-4 mb-4 flex-wrap">
          <div class="avatar-circle" id="avatarCircle">?</div>
          <div>
            <div class="profile-username" id="profileUsername">–</div>
            <div class="profile-role" id="profileRole"></div>
          </div>
        </div>

        <!-- Stats counters -->
        <div class="row g-3" id="statsRow">
          <div class="col-6 col-sm-3">
            <div class="profile-stat">
              <div class="profile-stat-num" id="statReviewed">–</div>
              <div class="profile-stat-label">Hodnoceno</div>
            </div>
          </div>
          <div class="col-6 col-sm-3">
            <div class="profile-stat">
              <div class="profile-stat-num" id="statAvgScore">–</div>
              <div class="profile-stat-label">Prům. skóre</div>
            </div>
          </div>
          <div class="col-6 col-sm-3">
            <div class="profile-stat">
              <div class="profile-stat-num" id="statEpisodes">–</div>
              <div class="profile-stat-label">Epizod</div>
            </div>
          </div>
          <div class="col-6 col-sm-3">
            <div class="profile-stat">
              <div class="profile-stat-num" id="statWatchlist">–</div>
              <div class="profile-stat-label">Watchlist</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Tabs -->
    <div class="profile-tabs">
      <div class="container d-flex gap-0">
        <button class="profile-tab-btn active" data-tab="reviews" id="tabReviews">
          <i class="bi bi-star-half me-1"></i>Moje hodnocení
          <span class="badge bg-secondary ms-1 small" id="tabReviewsBadge"></span>
        </button>
        <button class="profile-tab-btn" data-tab="watchlist" id="tabWatchlist">
          <i class="bi bi-bookmark me-1"></i>Chci sledovat
          <span class="badge bg-secondary ms-1 small" id="tabWatchlistBadge"></span>
        </button>
      </div>
    </div>

    <!-- Tab: Moje hodnocení -->
    <div class="container py-4" id="panelReviews">
      <div class="section-loader" id="reviewsLoader">
        <div class="spinner-border spinner-border-sm text-secondary me-2"></div>
        Načítám…
      </div>
      <div id="reviewsList" style="display:none;"></div>
    </div>

    <!-- Tab: Watchlist -->
    <div class="container py-4 d-none" id="panelWatchlist">
      <div class="section-loader" id="watchlistLoader">
        <div class="spinner-border spinner-border-sm text-secondary me-2"></div>
        Načítám…
      </div>
      <div id="watchlistGrid" class="row g-3" style="display:none;"></div>
    </div>

  </div><!-- /profileContent -->

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/toast.js"></script>
  <script src="/js/profile.js"></script>
</body>
</html>
