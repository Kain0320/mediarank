<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registrace – Media Ranker</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="bg-dark text-white">

  <nav class="navbar navbar-dark bg-dark border-bottom border-secondary">
    <div class="container">
      <a class="navbar-brand fw-bold" href="/">🎬 Media Ranker</a>
    </div>
  </nav>

  <main class="container" style="max-width: 440px; margin-top: 60px;">
    <div class="card bg-secondary text-white shadow">
      <div class="card-body p-4">
        <h2 class="card-title mb-4 text-center">Registrace</h2>

        <div id="alertBox" class="alert d-none" role="alert"></div>

        <form id="registerForm">
          <div class="mb-3">
            <label for="username" class="form-label">Uživatelské jméno</label>
            <input type="text" class="form-control" id="username"
              placeholder="aspoň 3 znaky" required />
          </div>
          <div class="mb-3">
            <label for="email" class="form-label">E-mail</label>
            <input type="email" class="form-control" id="email"
              placeholder="vas@email.cz" required />
          </div>
          <div class="mb-3">
            <label for="password" class="form-label">Heslo</label>
            <input type="password" class="form-control" id="password"
              placeholder="aspoň 4 znaky" required />
          </div>
          <div class="mb-4">
            <label for="gender" class="form-label">Pohlaví</label>
            <select class="form-select" id="gender" required>
              <option value="">-- Vyber pohlaví --</option>
              <option value="Male">Muž</option>
              <option value="Female">Žena</option>
            </select>
          </div>

          <button type="submit" class="btn btn-primary w-100">
            Vytvořit účet
          </button>
        </form>

        <hr class="my-3" />
        <p class="text-center mb-0 small">
          Máš účet? <a href="/login.html" class="text-info">Přihlas se</a>
        </p>
      </div>
    </div>
  </main>

  <script>
    document.getElementById("registerForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const alertBox = document.getElementById("alertBox");
      const body = {
        username: document.getElementById("username").value.trim(),
        email:    document.getElementById("email").value.trim(),
        password: document.getElementById("password").value,
        gender:   document.getElementById("gender").value
      };

      try {
        const res  = await fetch("/api/auth/register", {
          method:  "POST",
          headers: { "Content-Type": "application/json" },
          body:    JSON.stringify(body)
        });
        const data = await res.json();

        if (!res.ok) {
          const msg = data.errors ? data.errors.join("<br>") : data.error;
          alertBox.className   = "alert alert-danger";
          alertBox.innerHTML   = msg;
          alertBox.classList.remove("d-none");
          return;
        }

        localStorage.setItem("token",    data.token);
        localStorage.setItem("username", data.username);
        localStorage.setItem("role",     data.role);
        window.location.href = "/";

      } catch {
        alertBox.className  = "alert alert-danger";
        alertBox.textContent = "Chyba připojení k serveru";
        alertBox.classList.remove("d-none");
      }
    });
  </script>

</body>
</html>
